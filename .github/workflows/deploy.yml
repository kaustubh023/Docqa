name: Deploy DocQA to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          timeout: 600s
          script: |
            set -e

            echo "=========================================="
            echo "  DocQA Deployment Started"
            echo "  $(date)"
            echo "=========================================="

            APP_ROOT="/opt/docqa"
            if [ -x "$APP_ROOT/backend/venv/bin/python" ]; then
              VENV_PATH="$APP_ROOT/backend/venv"
            else
              VENV_PATH="$APP_ROOT/.venv"
            fi

            cd /opt/docqa

            echo "[1/6] Pulling latest code..."
            sudo mkdir -p /opt/docqa/backend/vector_db/.hf_cache/transformers
            sudo mkdir -p /opt/docqa/backend/vector_db/.hf_cache/sentence_transformers
            sudo chown -R azureuser:www-data /opt/docqa/backend/vector_db/.hf_cache
            sudo chmod -R ug+rwX /opt/docqa/backend/vector_db/.hf_cache
            sudo chown -R azureuser:azureuser /opt/docqa/backend/vector_db
            sudo chown -R azureuser:azureuser /opt/docqa/backend/media
            sudo chown -R azureuser:azureuser /opt/docqa/backend/staticfiles
            git fetch origin main
            git reset --hard origin/main

            echo "[2/6] Installing Python dependencies..."
            if [ ! -d "$VENV_PATH" ]; then
              python3 -m venv "$VENV_PATH"
            fi
            "$VENV_PATH/bin/pip" install --upgrade pip --quiet
            "$VENV_PATH/bin/pip" install -r requirements.txt --quiet

            echo "[3/6] Running migrations & collectstatic..."
            cd backend
            "$VENV_PATH/bin/python" manage.py migrate --noinput
            "$VENV_PATH/bin/python" manage.py collectstatic --noinput --clear
            cd ..

            echo "[4/6] Building frontend..."
            cd frontend
            if [ -f .env.production ]; then
              rm -f .env.production
            fi
            if [ -f ../deploy/azure-vm/env/frontend.env.production.example ]; then
              cp ../deploy/azure-vm/env/frontend.env.production.example .env.production
            else
              echo "VITE_API_BASE_URL=/api/" > .env.production
            fi
            npm install --silent
            npm run build
            cd ..

            echo "[5/6] Fixing permissions..."
            sudo chown -R www-data:www-data /opt/docqa/backend/media
            sudo chown -R www-data:www-data /opt/docqa/backend/vector_db
            sudo chown -R www-data:www-data /opt/docqa/backend/staticfiles
            sudo chmod -R ug+rwX /opt/docqa/backend/vector_db/.hf_cache

            echo "[6/6] Restarting services..."
            sudo systemctl restart docqa-backend
            sudo systemctl reload nginx

            # Ensure nginx can access Gunicorn unix socket even if unit permissions are strict.
            if [ -S /run/docqa/gunicorn.sock ]; then
              sudo chgrp www-data /run/docqa/gunicorn.sock || true
              sudo chmod 660 /run/docqa/gunicorn.sock || true
            fi

            echo "Running health check..."
            UPSTREAM_STATUS=$(curl --unix-socket /run/docqa/gunicorn.sock -s -o /dev/null -w "%{http_code}" http://localhost/api/users/me/ || echo "000")
            echo "Gunicorn socket check status: $UPSTREAM_STATUS"

            HTTP_STATUS="000"
            for i in $(seq 1 18); do
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://kp-docqa.duckdns.org/api/users/me/ || echo "000")
              if [ "$HTTP_STATUS" = "401" ] || [ "$HTTP_STATUS" = "200" ]; then
                break
              fi
              sleep 5
            done

            if [ "$HTTP_STATUS" = "401" ] || [ "$HTTP_STATUS" = "200" ]; then
              echo "Health check PASSED"
            else
              echo "docqa-backend status:"
              sudo systemctl --no-pager status docqa-backend || true
              echo "Recent backend logs:"
              sudo journalctl -u docqa-backend -n 80 --no-pager || true
              echo "Nginx status:"
              sudo systemctl --no-pager status nginx || true
              echo "Recent nginx error logs:"
              sudo tail -n 120 /var/log/nginx/error.log || true
              echo "Socket file details:"
              ls -l /run/docqa || true
              ls -l /run/docqa/gunicorn.sock || true
              echo "Health check FAILED - status: $HTTP_STATUS"
              exit 1
            fi

            echo "=========================================="
            echo "  Deployment SUCCESSFUL!"
            echo "  https://kp-docqa.duckdns.org"
            echo "=========================================="
